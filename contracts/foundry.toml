[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
gas_reports = ["FundingPool", "InvoiceRegistry"]

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true

[fuzz]
runs = 256

[rpc_endpoints]
mantle_sepolia = "${MANTLE_RPC_URL}"

[etherscan]
mantle_sepolia = { key = "${MANTLE_API_KEY}" }
